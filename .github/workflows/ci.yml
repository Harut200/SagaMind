name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint-type:
    name: Lint & Type-check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev]"
      - name: Ruff (lint)
        run: ruff check .
      - name: Ruff (format check)
        run: ruff format --check .
      - name: Mypy
        run: mypy src

  test:
    name: Test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install
        run: pip install -e ".[dev,dashboard]"
      - name: Pytest (with coverage gate)
        run: pytest --cov=src --cov-report=term-missing --cov-fail-under=80

  integration:
    name: Integration (live backends)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    services:
      timescaledb:
        image: timescale/timescaledb:latest-pg16
        env:
          POSTGRES_USER: sagamind_user
          POSTGRES_PASSWORD: sagamind_secure_pass_2026
          POSTGRES_DB: sagamind
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U sagamind_user -d sagamind"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 3s
          --health-retries 5
      neo4j:
        image: neo4j:5
        env:
          NEO4J_AUTH: neo4j/sagamind_secure_neo_2026
        ports:
          - 7687:7687
        options: >-
          --health-cmd "wget -q --spider http://localhost:7474 || exit 1"
          --health-interval 15s
          --health-timeout 10s
          --health-retries 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev,redis,integration]"
      - name: Integration tests
        run: pytest -m integration --tb=short -v
        env:
          RUN_INTEGRATION: "1"
          DB_HOST: 127.0.0.1
          DB_PORT: 5432
          DB_NAME: sagamind
          DB_USER: sagamind_user
          DB_PASS: sagamind_secure_pass_2026
          NEO4J_URI: bolt://127.0.0.1:7687
          NEO4J_USER: neo4j
          NEO4J_PASS: sagamind_secure_neo_2026
          REDIS_HOST: 127.0.0.1
          REDIS_PORT: 6379
          STATE_STORE_BACKEND: postgres

  grpc:
    name: gRPC codegen smoke test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install
        run: pip install -e ".[dev,grpc]"
      - name: Generate proto stubs
        run: bash scripts/gen_proto.sh
      - name: Smoke test import
        run: python -c "from src.grpc_server import build_servicer; build_servicer()"

  docker:
    name: Docker build
    runs-on: ubuntu-latest
    needs: [lint-type, test]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: false
          tags: sagamind:ci-${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  security:
    name: Dependency & secret scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: pip-audit
        run: |
          pip install pip-audit
          pip-audit -r requirements.txt || true
      - name: gitleaks
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

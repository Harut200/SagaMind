version: '3.8'

services:
  # TimescaleDB + pgvector (Episodic memory and time-series transactional logging)
  timescaledb:
    image: timescale/timescaledb-ha:pg15
    container_name: sagamind-timescaledb
    environment:
      - POSTGRES_DB=sagamind
      - POSTGRES_USER=sagamind_user
      - POSTGRES_PASSWORD=sagamind_secure_pass_2026
    ports:
      - "5432:5432"
    volumes:
      - timescale_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sagamind_user -d sagamind"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Neo4j (Neocortical Semantic Knowledge Graph)
  neo4j:
    image: neo4j:5.12-community
    container_name: sagamind-neo4j
    ports:
      - "7474:7474" # HTTP Dashboard
      - "7687:7687" # Bolt Protocol
    environment:
      - NEO4J_AUTH=neo4j/sagamind_secure_neo_2026
    volumes:
      - neo4j_data:/data
    healthcheck:
      test: ["CMD-SHELL", "cypher-shell -u neo4j -p sagamind_secure_neo_2026 'RETURN 1'"]
      interval: 10s
      timeout: 10s
      retries: 5

  # Redis (Saga transactional log cache and fast queue coordination)
  redis:
    image: redis:7.0-alpine
    container_name: sagamind-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  # SagaMind Core Engine service container
  sagamind-core:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: sagamind-core-service
    depends_on:
      timescaledb:
        condition: service_healthy
      neo4j:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "8000:8000" # FastAPI REST/WebSockets Gateway
      - "50051:50051" # gRPC Engine Gateway
    environment:
      - ENV=production
      - DB_HOST=timescaledb
      - DB_NAME=sagamind
      - DB_USER=sagamind_user
      - DB_PASS=sagamind_secure_pass_2026
      - NEO4J_URI=bolt://neo4j:7687
      - NEO4J_USER=neo4j
      - NEO4J_PASS=sagamind_secure_neo_2026
      - REDIS_HOST=redis
    volumes:
      - .:/app

volumes:
  timescale_data:
  neo4j_data:
  redis_data:
